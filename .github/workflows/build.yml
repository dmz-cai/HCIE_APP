name: Build HCIE APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          git zip unzip openjdk-17-jdk wget \
          autoconf libtool pkg-config \
          libncurses5-dev libncursesw5-dev \
          libtinfo5 cmake libffi-dev libssl-dev \
          automake build-essential \
          libltdl-dev
    
    - name: Install Python dependencies
      run: |
        pip install --upgrade pip setuptools wheel
        pip install buildozer cython==0.29.36 pillow
    
    - name: Initialize Buildozer
      run: |
        buildozer init || true
    
    - name: Build APK (debug)
      run: |
        buildozer android debug 2>&1 | tee build.log
      continue-on-error: true
    
    - name: Show build log on failure
      if: failure()
      run: |
        echo "=== Build Log ==="
        cat build.log || echo "No build log"
        echo "=== Directory contents ==="
        ls -la
        echo "=== .buildozer contents ==="
        ls -la .buildozer/ || echo "No .buildozer directory"
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: HCIE-APK
        path: bin/*.apk
    
    - name: Upload build log on failure
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: build-log
        path: build.log
