name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          openjdk-17-jdk \
          git zip unzip \
          autoconf libtool \
          pkg-config \
          libncurses5-dev libncursesw5-dev \
          cmake \
          libffi-dev libssl-dev \
          automake \
          build-essential \
          libltdl-dev \
          wget
    
    - name: Set Java environment
      run: |
        echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV
        echo "$JAVA_HOME/bin" >> $GITHUB_PATH
    
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install cython==0.29.36
        pip install buildozer
        pip install pillow
    
    - name: Verify Cython installation
      run: |
        which cython
        cython --version
        pip show cython
    
    - name: Show buildozer spec
      run: |
        echo "=== buildozer.spec content ==="
        cat buildozer.spec || echo "No buildozer.spec found"
    
    - name: Build APK with verbose logging
      run: |
        echo "Starting buildozer build..."
        buildozer android debug 2>&1 | tee build_output.txt
        echo "Build finished with exit code: $?"
      continue-on-error: true
    
    - name: Show build output
      if: always()
      run: |
        echo "=== Build Output (last 100 lines) ==="
        tail -100 build_output.txt || echo "No build output file"
        echo "=== Directory listing ==="
        ls -la || true
        echo "=== bin directory ==="
        ls -la bin/ || echo "No bin directory"
    
    - name: Upload APK on success
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: HCIE-APK
        path: bin/*.apk
    
    - name: Upload build log on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: build_output.txt
